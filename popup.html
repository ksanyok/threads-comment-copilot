<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Threads Comment</title>
<style>
  :root{ --bg:#0d0d0d; --panel:#161618; --line:#2b2b2f; --ink:#e7e9ea; --muted:#8b8b92; --accent:#1d9bf0; --ok:#16a34a; }
  *{box-sizing:border-box}
  body{ width:420px; margin:0; padding:12px 14px 16px; background:var(--bg); color:var(--ink);
        font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
  header{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  header .title{ font-weight:700; font-size:15px; }
  header .sp{ flex:1; }
  .icon{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px; border-radius:8px; }
  .icon:hover{ color:var(--ink); background:#222; }

  .lead{ font-size:12px; color:var(--muted); margin:0 0 8px; }
  .themes{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .theme{ background:#1a1a1d; color:var(--ink); border:1px solid var(--line); border-radius:999px; padding:5px 11px; font-size:12px; cursor:pointer; }
  .theme:hover{ border-color:var(--accent); color:#fff; }

  .btn{ width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px;
         padding:10px; font-weight:600; font-size:14px; cursor:pointer; }
  .btn:hover{ opacity:.92; } .btn:disabled{ opacity:.5; cursor:default; }
  .btn.ok{ background:var(--ok); }

  #msg{ font-size:13px; color:var(--muted); margin:9px 0 0; }
  #msg.err{ color:#f87171; }
  .hintlink{ color:var(--accent); cursor:pointer; text-decoration:underline; }

  #list{ margin-top:10px; }
  .it{ border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:8px; background:var(--panel); }
  .it-meta{ display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .it-chip{ background:rgba(22,163,74,.16); color:#41d77a; border:1px solid rgba(22,163,74,.5); font:600 11px/1 inherit; padding:3px 8px; border-radius:999px; }
  .it-chip.lead{ background:rgba(245,158,11,.16); color:#f59e0b; border-color:rgba(245,158,11,.5); }
  .it-author{ color:var(--muted); font-size:12px; }
  .it-time{ margin-left:auto; color:var(--muted); font-size:11px; white-space:nowrap; }
  .found-bar{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; color:var(--muted); font-size:12px; }
  .it-sn{ color:#cfd2d4; font-size:13px; max-height:4.6em; overflow:hidden; }
  .row{ display:flex; align-items:center; gap:6px; margin-top:8px; }
  .sp{ flex:1; }
  .act{ background:#202327; color:var(--ink); border:1px solid var(--line); border-radius:9px; padding:7px 10px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .act:hover{ background:#2c2c30; }
  .act.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .it-draft{ margin-top:8px; }
  textarea{ width:100%; background:#000; color:var(--ink); border:1px solid var(--line); border-radius:10px;
            padding:9px; font:14px/1.45 inherit; resize:vertical; }
  textarea:focus{ outline:none; border-color:var(--accent); }
  .count{ font-size:12px; color:var(--muted); }
  .status{ font-size:12px; color:var(--muted); }
  .status.err{ color:#f87171; }

  .div{ display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; margin:14px 0 8px; }
  .div::before,.div::after{ content:""; flex:1; height:1px; background:var(--line); }
  #input{ min-height:70px; }
</style>
</head>
<body>
  <header>
    <span class="title" data-i18n>🧵 Комментарии Threads</span>
    <span class="sp"></span>
    <button class="icon" id="settings" data-i18n-title title="Настройки">⚙</button>
  </header>

  <p class="lead" data-i18n>Открой ленту или поиск Threads по своей теме — расширение подберёт подходящие ветки. Или выбери тему ниже:</p>
  <div class="themes" id="themes"></div>

  <button class="btn" id="scan" data-i18n>🔄 Показать подходящие на странице</button>
  <button class="btn" id="pollNow" data-i18n style="margin-top:8px;background:#202327;border:1px solid var(--line)">🔔 Поискать новые в фоне сейчас</button>
  <div id="msg"></div>
  <div id="list"></div>

  <div class="div" data-i18n>или впишите текст вручную</div>
  <textarea id="input" data-i18n-ph placeholder="Вставьте сюда пост, на который пишем комментарий…"></textarea>
  <button class="btn" id="gen" data-i18n style="margin-top:9px">Сформировать комментарий</button>
  <div id="manualWrap"></div>

  <div class="div" data-i18n>пост мне в ленту</div>
  <p class="lead" data-i18n>Нажмите «Запропонувати теми» — подберу темы в вашем стиле и языке. Или впишите свою. Публикуете сами.</p>
  <button class="btn" id="suggestTopics" data-i18n style="background:#202327;border:1px solid var(--line)">💡 Запропонувати теми</button>
  <div class="themes" id="postThemes" style="margin-top:8px"></div>
  <textarea id="postInput" data-i18n-ph placeholder="…или своя тема для поста" style="min-height:42px;margin-top:6px"></textarea>
  <button class="btn" id="genPost" data-i18n style="margin-top:9px">Сгенерировать пост</button>
  <div id="postWrap"></div>

  <script src="i18n.js"></script>
  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
